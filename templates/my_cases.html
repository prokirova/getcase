<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мои кейсы</title>
    <style>
        body {
            background: linear-gradient(135deg, #9198e5, #D8C3F9);
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover;
            font-family: 'Bahnschrift', 'Segoe UI', sans-serif;
            min-height: 100vh;
            color: #000000;
            overflow-x: hidden;
        }

        @font-face {
            font-family: 'VT323';
            src: url('/static/VT323-Regular.woff2') format('woff2');
            /* Если шрифт локально не подгрузится, используем моноширинный по умолчанию */
        }

        .back-link {
            position: absolute;
            top: 40px;
            right: 50px;
            color: white;
            font-size: 1.2rem;
            text-decoration: none;
            font-weight: 500;
            opacity: 0.9;
            transition: opacity 0.2s;
        }

        .back-link:hover {
            opacity: 1;
        }

        #page-title,
        #main-container {
            margin-left: min(40px, 5%);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .company {
            font-size: 14px;
            color: #888;
        }

        .title {
            font-size: 20px;
            font-weight: bold;
            margin: 10px 0;
        }

        .desc {
            color: #555;
            font-size: 14px;
        }

        .footer {
            margin-top: 15px;
            font-size: 13px;
            color: #777;
        }

        .btn {
            display: block;
            margin-top: 15px;
            padding: 10px;
            text-align: center;
            background: linear-gradient(90deg, #a18cd1, #6a9ff8);
            color: white;
            border-radius: 20px;
            font-weight: bold;
            text-decoration: none;
        }
    </style>
</head>
<body>

<h1 id="page-title">Мои кейсы</h1>

<div id="main-container">
    {% if cases %}
        <div class="grid">
            {% for case in cases %}
                <div class="card">
                    <div class="company">{{ case.company_name }}</div>

                    <div class="title">
                        {{ case.description[:60] }}{% if case.description|length > 60 %}...{% endif %}
                    </div>

                    <div class="desc">
                        {{ case.description[:120] }}
                    </div>

                    <div class="footer">
                        До: {{ case.end_time }}
                    </div>

                    <a href="/case/{{ case.id }}" class="btn">
                        Просмотреть
                    </a>
                </div>
            {% endfor %}
        </div>
    {% else %}
        <p>У вас пока нет кейсов</p>
    {% endif %}
</div>

<a href="/" class="back-link">← На главную</a>

</body>
</html>
