<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — GETCASE</title>

    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        @font-face {
        font-family: VT323;
        src: url('static/VT323-Regular.woff2');
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #9198e5, #D8C3F9);
            background-attachment: fixed;
            background-size: cover;
            color: #000;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 1.2rem;
            text-decoration: none;
            font-weight: 500;
            opacity: 0.9;
            transition: opacity 0.2s;
        }

        .back-link:hover {
            opacity: 1;
        }

        .container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.18);
            border: 2px solid rgba(111, 44, 128, 0.3);
            text-align: center;
        }

        .logo {
            font-family: VT323;
            font-size: 5.5rem;
            color: #7C5EB5;
            letter-spacing: 4px;
            margin-bottom: 32px;
            text-shadow: 3px 3px 0 #b023d3, -1px -1px 0 #000;
            line-height: 1;
        }

        h1 {
            font-size: 2.2rem;
            color: #000;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 1.15rem;
            color: #333;
            margin-bottom: 36px;
            opacity: 0.9;
        }

        .form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            text-align: left;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            font-size: 1.1rem;
            border: 2px solid #A08CD9;
            border-radius: 16px;
            background: rgba(255,255,255,0.7);
            color: #000;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #b023d3;
            box-shadow: 0 0 0 4px rgba(176, 35, 211, 0.2);
        }

        input::placeholder {
            color: #777;
        }

        button {
            margin-top: 12px;
            padding: 18px;
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            background: linear-gradient(90deg, #7C5EB5, #A08CD9);
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 6px 20px rgba(111, 44, 128, 0.4);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(111, 44, 128, 0.55);
        }

        .error {
            background: rgba(255, 80, 80, 0.2);
            border: 2px solid #ff5050;
            color: #c00;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .register-link {
            margin-top: 28px;
            font-size: 1.05rem;
            color: #333;
        }

        .register-link a {
            color: #6f2c80;
            font-weight: bold;
            text-decoration: underline;
        }

        .register-link a:hover {
            color: #b023d3;
        }
    </style>
</head>
<body>

    <a href="/" class="back-link">← На главную</a>

    <div class="container">
        <div class="logo">GETCASE</div>

        <h1>Вход в систему</h1>
        <div class="subtitle">Добро пожаловать обратно</div>

        <!-- Здесь можно выводить ошибки через Jinja, как раньше -->
        <!-- {% with messages = get_flashed_messages() %} ... {% endwith %} -->

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="error">
                    {% for message in messages %}
                        <div>{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form method="POST" action="/login" class="form">
            <div class="form-group">
                <input type="email" name="email" placeholder="Ваш email" required>
            </div>

            <div class="form-group">
                <input type="password" name="password" placeholder="Пароль" required>
            </div>

            <button type="submit">Войти</button>
        </form>

        <div class="register-link">
            Нет аккаунта? <a href="/register">Зарегистрироваться</a>
        </div>
    </div>

</body>
</html>
