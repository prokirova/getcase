<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль</title>
</head>
<body>
    <div id="main-container">
        <div id="profile-image-box">
            <img src="/static/Person.png" alt="Фото профиля" id="profile-image">
        </div>

        <div id="user-info">
            <!-- Полное имя теперь редактируется -->
            <input type="text" id="full_name" class="main-input" value="{{ user.full_name }}">

            <div id="user-bio">
                <div class="bio-row">
                    <p class="user-bio-title">ВУЗ</p>
                    <input type="text" id="university" class="edit-input" value="{{ user.university }}">
                </div>

                <div class="bio-row">
                    <p class="user-bio-title">Курс</p>
                    <input type="text" id="course" class="edit-input" value="{{ user.course }}">
                </div>

                <div class="bio-row">
                    <p class="user-bio-title">Институт</p>
                    <input type="text" id="faculty" class="edit-input" value="{{ user.institute }}">
                </div>

                <div class="bio-row">
                    <p class="user-bio-title">Направление</p>
                    <input type="text" id="specialty" class="edit-input" value="{{ user.specialty }}">
                </div>

                <div class="bio-row">
                    <p class="user-bio-title">Email</p>
                    <input type="email" id="email" class="edit-input" value="{{ user.email }}">
                </div>

                <div class="bio-row">
                    <p class="user-bio-title">Телефон</p>
                    <input type="tel" id="phone" class="edit-input" value="{{ user.phone or '' }}">
                </div>

                <div class="bio-row">
                    <p class="user-bio-title">Телеграм</p>
                    <input type="text" id="tg_id" class="edit-input" value="{{ user.telegram or '' }}">
                </div>
            </div>
        </div>



        <h2 id="user-skills-title">Мои навыки:</h2>

        <div id="skills-container">
            {% for skill in user.skills %}
            <div class="skillbox">
                <span>{{ skill }}</span>
                <button class="delete-skill">×</button>
            </div>
            {% endfor %}
            <input type="text" id="new-skill-input" placeholder="Добавить навык...">
        </div>
    </div>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #9198e5, #D8C3F9);
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover;

            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;

            font-family: 'Bahnschrift', sans-serif;
        }

        #main-container {
            display: grid;
            grid-gap: 1rem;
            grid-template-areas:
                "profile-image-box user-info side-buttons-div"
                "user-skills-title skills-container skills-container";
            grid-template-columns: minmax(200px, 15%) 1fr minmax(60px, 12%);

            margin: 50px 2%;
            max-width: 96%;
            width: 96%;
        }

        #profile-image-box {
            grid-area: profile-image-box;
            background-color: rgb(227, 227, 227);
            height: 200px;
            width: 200px;
            border-radius: 100px;

            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #profile-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #side-buttons-div {
            grid-area: side-buttons-div;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .back-link {
            font-size: 1.5rem;
            text-decoration: none;
            font-weight: bold;
            color: black;
        }

        #user-info {
            grid-area: user-info;
        }

        /* Стиль для редактируемого полного имени */
        .main-input {
            margin-bottom: 20px;
            font-size: 40px;
            font-weight: bold;
            border: none;
            background: transparent;
            width: 100%;
            padding: 0;
            outline: none;
            font-family: inherit;
        }

        #user-bio {
            background-color: #ffffff36;
            border-radius: 23px;
        }

        .bio-row {
            margin: 15px;
            padding: 10px;
            background: white;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-bio-title {
            font-size: 16px;
            color: gray;
            margin: 0;
        }

        .edit-input {
            font-size: 18px;
            padding: 5px;
            border-radius: 8px;
            border: none;
            width: 60%;
            text-align: right;
            outline: none;
            background: #f9f9f9;
            font-family: inherit;
        }

        .edit-input:focus {
            background: #fff;
            box-shadow: 0 0 0 2px #654EB9;
        }

        #show-cases-in-progress-btn {
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            background-color: #654EB9;
            color: white;
            cursor: pointer;
        }

        #user-skills-title {
            grid-area: user-skills-title;
            margin-top: 20px;
            font-size: 24px;
        }

        #skills-container {
            grid-area: skills-container;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .skillbox {
            margin: 0;
            padding: 8px 15px;
            background-color: #654EB9;
            border-radius: 20px;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .delete-skill {
            background: transparent;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            padding: 0 4px;
            line-height: 1;
        }

        .delete-skill:hover {
            color: #ffaaaa;
        }

        #new-skill-input {
            margin: 0;
            padding: 8px 15px;
            border-radius: 20px;
            border: none;
            background-color: #999;
            color: white;
            font-family: inherit;
            font-size: 14px;
            outline: none;
        }

        #new-skill-input::placeholder {
            color: #eee;
        }

        #new-skill-input:focus {
            background-color: #7a7a7a;
        }
    </style>

    <script>
        // === АВТОСОХРАНЕНИЕ ПОЛЕЙ ===
        // Собираем все поля ввода, которые должны сохраняться
        const autoSaveInputs = document.querySelectorAll('#full_name, .edit-input');

        async function saveProfile() {
            // Собираем данные со всех полей
            const data = {
                full_name: document.getElementById('full_name').value,
                university: document.getElementById('university').value,
                course: document.getElementById('course').value,
                faculty: document.getElementById('faculty').value,
                specialty: document.getElementById('specialty').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                tg_id: document.getElementById('tg_id').value,
                skills: collectSkills()
            };

            try {
                const response = await fetch('/api/update_profile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (!result.success) {
                    console.warn('Ошибка при сохранении:', result.error);
                }
            } catch (err) {
                console.error('Ошибка сети:', err);
            }
        }

        // Вешаем сохранение при потере фокуса на всех полях
        autoSaveInputs.forEach(input => {
            input.addEventListener('blur', saveProfile);
        });

        // === НАВЫКИ ===
        function collectSkills() {
            const skills = [];
            document.querySelectorAll('.skillbox span').forEach(span => {
                skills.push(span.textContent);
            });
            return skills;
        }

        // Удаление навыка (только по кнопке)
        function attachDeleteHandler(button) {
            button.addEventListener('click', (e) => {
                e.stopPropagation();
                const skillbox = button.closest('.skillbox');
                if (skillbox) skillbox.remove();
                saveProfile();  // автосохраняем после удаления
            });
        }

        // Добавляем обработчики на существующие кнопки удаления
        document.querySelectorAll('.delete-skill').forEach(attachDeleteHandler);

        // Добавление нового навыка по Enter
        const newSkillInput = document.getElementById('new-skill-input');
        newSkillInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && newSkillInput.value.trim() !== '') {
                const skillName = newSkillInput.value.trim();

                // Создаём элемент навыка
                const skillDiv = document.createElement('div');
                skillDiv.className = 'skillbox';
                skillDiv.innerHTML = `
                    <span>${escapeHtml(skillName)}</span>
                    <button class="delete-skill">×</button>
                `;

                // Добавляем обработчик на новую кнопку удаления
                const deleteBtn = skillDiv.querySelector('.delete-skill');
                attachDeleteHandler(deleteBtn);

                // Вставляем перед полем ввода
                document.getElementById('skills-container').insertBefore(skillDiv, newSkillInput);

                // Очищаем поле и сохраняем
                newSkillInput.value = '';
                saveProfile();
            }
        });

        // Простейшая защита от XSS через навыки
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
    </script>
</body>
</html>
