<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>

</head>
<body>
    <a href="/" class="back-button">← На главную</a>

    <div class="container">
        <div class="header">
            <h1>Регистрация</h1>
            <div class="subtitle">Создайте свой аккаунт</div>
        </div>

        <div class="error-message" style="display: none;"></div>

        <form method="POST" class="register-form">
        <div class="form-group">
            <input type="text" name="username" placeholder="Как к вам обращаться?" required>
        </div>

        <div class="form-group">
            <input type="email" name="email" placeholder="Email для входа" required>
        </div>

        <div class="form-group">
            <input type="password" name="password" placeholder="Пароль" required>
        </div>

        <div class="form-hint">
            Пароль должен содержать не менее 6 символов
        </div>

        <button type="submit">Создать аккаунт</button>
        </form>

        <div class="login-link">
            Уже есть аккаунт? <a href="/login">Войти в систему</a>
        </div>
    </div>
</body>
</html>
