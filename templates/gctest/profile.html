<!DOCTYPE html>
<html lang=ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="profile.css">
    <title>Профиль</title>
</head>
<body>
    <div id="main-container">
        <div id="profile-image-box">
            <img src="pfp.png" alt="000" id="profile-image">
        </div>

        <div id="user-info">
            <div id="username">Т-Прогер</div>

            <div id="user-bio">
                <div class="bio-row" id="university">
                    <p class="user-bio-title">ВУЗ</p>
                    <p class="user-bio-info">Ваш университет</p>
                </div>
                <div class="bio-row" id="grade">
                    <p class="user-bio-title">Курс</p>
                    <p class="user-bio-info">Этот курс</p>
                </div>
                <div class="bio-row" id="institute">
                    <p class="user-bio-title">Институт</p>
                    <p class="user-bio-info">Ваш Институт</p>
                </div>
                <div class="bio-row" id="speciality">
                    <p class="user-bio-title">Специальность</p>
                    <p class="user-bio-info">Это специальность</p>
                </div>
                <div class="bio-row" id="email">
                    <p class="user-bio-title">Email</p>
                    <p class="user-bio-info">danilevsky@yandex.ru</p>
                </div>
                <div class="bio-row" id="phone-number">
                    <p class="user-bio-title">Телефон</p>
                    <p class="user-bio-info">+79281750344</p>
                </div>
            </div>
        </div>

        <div id="return-btn-div">
            <button id="return-btn"></button>
        </div>
    
        <h2 id="user-skills-title">Мои навыки:</h2>
        
        <div id="skills-container">
            <div class="skillbox">SQL</div>
            <div class="skillbox">Python</div>
            <div class="skillbox">Assembler</div>
            <div class="skillbox">C#</div>
            <div class="skillbox">Soft+</div>
            <div class="skillbox">Java</div>
            <div class="skillbox">Jira</div>
            <div class="skillbox">CI/CD</div>
            <div class="skillbox">CD/CI</div>
            <div class="skillbox">ML</div>
            <div class="skillbox">DS</div>
            <div class="skillbox">etc.</div>
            <button id="add-skill">+</button>
        </div>
    </div>

    <script src="profile.js"></script>
</body>
</html>
