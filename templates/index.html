<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GETCASE — Главная</title>
    <style>
        /* --- Базовые переменные и шрифты --- */
        :root {
            --primary-color: #6f2c80;
            --accent-color: #b023d3;
            --text-color: #000000;
            --bg-gradient: linear-gradient(135deg, #9198e5, #D8C3F9);
            --sidebar-width: 300px;
        }

        @font-face {
            font-family: 'VT323';
            src: url('/static/VT323-Regular.woff2') format('woff2');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-gradient);
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover;
            font-family: 'Bahnschrift', 'Segoe UI', sans-serif;
            min-height: 100vh;
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* --- Шапка (Header) --- */
        .main-header {
            background-color: transparent;
            padding: 1rem 0;
            position: sticky;
            top: 0;
            width: 100%;
            z-index: 100;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 97%;
            margin: 0 auto;
            padding: 0 20px;
        }

        .sidebar-toggle {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-top: 20px;
        }

        .sidebar-toggle span {
            display: block;
            width: 25px;
            height: 3px;
            background-color: white;
            border-radius: 2px;
        }

        .profile-btn {
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.18);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.25);
            transition: 0.2s;
            overflow: hidden;
            margin-top: 20px;
            text-decoration: none;
        }

        .profile-btn:hover {
            transform: scale(1.08);
            background: rgba(255,255,255,0.28);
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- Сайдбар (Sidebar) --- */
        .sidebar {
            position: fixed;
            top: 0;
            left: calc(var(--sidebar-width) * -1);
            width: var(--sidebar-width);
            height: 100%;
            background: white;
            z-index: 1000;
            transition: 0.3s ease;
            box-shadow: 2px 0 10px rgba(0,0,0,0.2);
        }

        .sidebar.active {
            left: 0;
        }

        .sidebar-header {
            padding: 20px;
            background: var(--primary-color);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
        }

        .sidebar-nav ul {
            list-style: none;
            padding: 20px;
        }

        .sidebar-nav li {
            margin-bottom: 15px;
        }

        .sidebar-nav a {
            text-decoration: none;
            color: var(--text-color);
            font-weight: 500;
            transition: color 0.2s;
        }

        .sidebar-nav a:hover {
            color: var(--accent-color);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 999;
        }

        .overlay.active {
            display: block;
        }

        /* --- Основной контент страницы --- */
        #main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 120px;
            padding-bottom: 50px;
        }

        #logo-container {
            font-family: 'VT323', monospace;
            font-size: clamp(80px, 15vw, 190px);
            font-weight: bold;
            color: white;
            text-shadow: 4px 4px 0px rgba(0,0,0,0.1);
            margin-bottom: 10px;
            text-align: center;
        }

        #search-bar-container {
            width: 90%;
            max-width: 600px;
            height: 54px;
            display: flex;
            background: white;
            border-radius: 27px;
            padding: 5px 20px;
            margin-bottom: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        #search-bar-container input {
            flex: 1;
            border: none;
            outline: none;
            padding: 0 10px;
            font-size: 16px;
        }

        #search-bar-container button {
            background: none;
            border: none;
            cursor: pointer;
            font-weight: bold;
            color: var(--primary-color);
            padding: 0 10px;
        }

        /* Теги компаний */
        #top-cases {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }

        .company-card {
            padding: 10px 25px;
            border: 2px solid black;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        .company-card:hover {
            background: white;
            transform: translateY(-3px);
        }

        /* Сетка карточек */
        #all-cases-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            width: 90%;
            max-width: 1200px;
            margin-top: 60px;
        }

        .case-card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            transition: transform 0.3s;
        }

        .case-card:hover {
            transform: translateY(-5px);
        }

        .case-card h3 {
            margin-bottom: 10px;
            color: var(--primary-color);
        }

        .case-card p {
            font-size: 14px;
            line-height: 1.5;
            color: #555;
            margin-bottom: 20px;
        }

        .open-case-btn {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: var(--primary-color);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .open-case-btn:hover {
            background: var(--accent-color);
        }

        /* Фильтр */
        /* Список опций (скрыт по умолчанию) */        
        .filter-content {
            display: none;
            position: absolute;
            background-color: #ffffff;
            min-width: 200px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.1);
            z-index: 1;
            border-radius: 8px;
            margin-top: 5px;
            border: 1px solid #eee;
            overflow: hidden;
        }

        /* Стили для элементов списка */
        .filter-content a {
            color: #333;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-size: 14px;
            transition: background 0.2s;
        }

        .filter-content a:hover {
            background-color: #f1f1f1;
            color: #007bff;
        }

        /* Класс для отображения списка */
        .show {
            display: block;
        }

        .arrow {
            border: solid #555;
            border-width: 0 2px 2px 0;
            display: inline-block;
            padding: 3px;
            transform: rotate(45deg);
        }

    </style>
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <button class="sidebar-toggle" id="openSidebar" aria-label="Открыть меню">
                <span></span>
                <span></span>
                <span></span>
            </button>

            {% if session.get('user_id') %}
                <a href="/profile" class="profile-btn">
            {% else %}
                <a href="/login" class="profile-btn">
            {% endif %}
                    <img src="/static/Person.png" alt="Профиль" class="profile-img">
                </a>
        </div>
    </header>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>GETCASE</h3>
            <button class="close-btn" id="closeSidebar">&times;</button>
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li><a href="/profile">ПРОФИЛЬ</a></li>
                <li><a href="/">ГЛАВНАЯ</a></li>
                <li><a href="/my_cases">КЕЙСЫ В РАБОТЕ</a></li>
                <li><a href="/cases">ВСЕ КЕЙСЫ</a></li>
                <li><hr style="border: 0; border-top: 1px solid #eee; margin: 10px 0;"></li>
                <li><a href="/logout">ВЫЙТИ ИЗ ПРОФИЛЯ</a></li>
            </ul>
        </nav>
    </aside>

    <div class="overlay" id="overlay"></div>

    <div id="main-container">
        <section id="main-info-container">
            <div id="logo-container">GETCASE</div>
            
            <div id="search-bar-container">
                <button id="search-cases-btn">Найти</button>
                <input type="search" placeholder="Найти кейс по названию или компании...">
                <button onclick="toggleFilter()" class="filter-button">
                    Сортировка <i class="arrow"></i>
                </button>
                <div id="filterMenu" class="filter-content">
                    <a href="#" onclick="selectOption('По актуальности')">По актуальности</a>
                    <a href="#" onclick="selectOption('По новизне')">По новизне</a>
                    <a href="#" onclick="selectOption('По популярности')">За эту неделю</a>
                    <a href="#" onclick="selectOption('По сложности')">За этот день</a>
                </div>
            </div>

            <div id="top-cases-container">
                <div style="text-align: center; color: white; font-weight: 500;">Посмотреть кейсы топ компаний:</div>
                <div id="top-cases">
                    <div class="company-card">Ozon</div>
                    <div class="company-card">Yandex</div>
                    <div class="company-card">Sber</div>
                    <div class="company-card">VK</div>
                </div>
            </div>
        </section>

        <section id="all-cases-container"></section>
    </div>

    <script>
        // Логика сайдбара
        const openBtn = document.getElementById('openSidebar');
        const closeBtn = document.getElementById('closeSidebar');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        function toggleSidebar() {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        openBtn.addEventListener('click', toggleSidebar);
        closeBtn.addEventListener('click', toggleSidebar);
        overlay.addEventListener('click', toggleSidebar);

        // Логика поиска
        document.getElementById("search-cases-btn").addEventListener("click", () => {
            const query = document.querySelector('input[type="search"]').value;
            if(query) alert("Ищем: " + query);
        });

        async function loadCases() {
            try {
                const res = await fetch('/api/cases');
                const data = await res.json();

                const container = document.getElementById('all-cases-container');

                if (!res.ok) {
                    container.innerHTML = "Ошибка загрузки";
                    return;
                }

                if (data.length === 0) {
                    container.innerHTML = "Нет кейсов";
                    return;
                }

                container.innerHTML = data.map(c => `
                    <div class="case-card">
                        <h3>${c.company_name || 'Компания'}</h3>
                        <p>${c.description.slice(0, 120)}</p>
                        <button class="open-case-btn" onclick="openCase(${c.id})">
                            Открыть кейс
                        </button>
                    </div>
                `).join('');

            } catch (e) {
                document.getElementById('all-cases-container').innerHTML =
                    "Ошибка: " + e.message;
            }
        }

        function openCase(id) {
            window.location.href = `/case/${id}`;
        }

        loadCases();

        /* Переключение видимости меню */
        function toggleFilter() {
            document.getElementById("filterMenu").classList.toggle("show");
        }

        /* Логика выбора (пока просто выводит в консоль) */
        function selectOption(val) {
            console.log("Выбрано:", val);
            // Здесь можно добавить вызов функции для реальной сортировки данных
            toggleFilter(); // Закрыть меню после выбора
        }

        /* Закрытие меню при клике вне его области */
        window.onclick = function(event) {
            if (!event.target.matches('.filter-button')) {
                var dropdowns = document.getElementsByClassName("filter-content");
                for (var i = 0; i < dropdowns.length; i++) {
                    var openDropdown = dropdowns[i];
                    if (openDropdown.classList.contains('show')) {
                        openDropdown.classList.remove('show');
                    }
                }
            }
        }
    </script>
</body>
</html>
