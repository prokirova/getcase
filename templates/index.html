    <style>
        /*
        ОБЩИЙ СТИЛЬ СТРАНИЦЫ

        * {

        }

            background-repeat: no-repeat;

            background-size: cover;

            background-position: center;

        /*
        ОСНОВНОЙ КОНТЕНТ

        #main-container {

        }

        #logo-container {

            font-weight: bold;
        }

        #search-bar-container {
            margin: 20px;
            width: 50%;
            height: 50px;

            flex-direction: row;
            
            border-radius: 25px;
            background-color: white;
            padding: 10px;
        }
        
        #search-bar-container button {
            flex: 1;
            background-color: inherit;
            border: none;
            border-radius: inherit;
        }

            border: none;

        #top-cases-title {

            margin-bottom: 20px;
        }

        #top-cases {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
        }

        .company-card {

            height: 60px;
            padding: 5px 15px;  
            margin: 10px 15px;
            
            display: flex;
            flex-direction: row;
            gap: 20px;
            align-items: center;
            justify-content: center;
            
            border: 2px solid black;
            border-radius: 30px;
            background-color: #9198e542;
            font-size: 18px;
        }
        
        .company-card:hover {
            background-color: #9198e5;
            transition: 0.25s;
            padding: 5px 20px;
            margin: 10px;
        }

        #all-cases-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            margin: 20px;
        }
        
        .caseCard {
            margin: 20px 30px;
        }
