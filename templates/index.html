<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GETCASE</title>
    <script src="header.js" defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #9198e5, #D8C3F9);
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover;
            font-family: 'Bahnschrift', sans-serif;
            min-height: 100vh;
        }

        @font-face {
            font-family: VT323;
            src: url(/static/VT323-Regular.woff2) format('woff2');
        }

        #main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 100px; /* Отступ под шапку */
        }

        #logo-container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            font-family: VT323;
            font-size: 190px;
        }

        #search-bar-container {
            width: 90%;
            max-width: 600px;
            height: 50px;
            display: flex;
            background: white;
            border-radius: 25px;
            padding: 5px 15px;
            margin-bottom: 40px;
        }

        #search-bar-container input {
            flex: 1;
            border: none;
            outline: none;
            padding: 0 10px;
        }

        #search-bar-container button {
            background: none;
            border: none;
            cursor: pointer;
            font-weight: bold;
            color: #6f2c80;
        }

        #top-cases {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        .company-card {
            padding: 10px 20px;
            border: 2px solid black;
            border-radius: 30px;
            background: rgba(145, 152, 229, 0.2);
            cursor: pointer;
            transition: 0.3s;
        }

        .company-card:hover {
            background: #9198e5;
            transform: translateY(-3px);
        }

        #all-cases-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 50px;
        }

        .caseCard {
            background: white;
            width: 300px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <main-header></main-header>

    <div id="main-container">
        <section id="main-info-container">
            <div id="logo-container">GETCASE</div>
            
            <div id="search-bar-container">
                <button id="search-cases-btn">Найти</button>
                <input type="search" placeholder="Найти кейс...">
                <button id="filter-cases-btn">Фильтр</button>
            </div>

            <div id="top-cases-container">
                <div style="text-align: center; margin-bottom: 15px;">Посмотреть варианты из топ компаний</div>
                <div id="top-cases">
                    <div class="company-card">Ozon</div>
                    <div class="company-card">Yandex</div>
                    <div class="company-card">Sber</div>
                    <div class="company-card">VK</div>
                </div>
            </div>
        </section>

        <section id="all-cases-container">
            <div class="caseCard">
                <h3>Дизайн-система</h3>
                <p>Разработка интерфейса для крупного ритейлера</p>
                <br>
                <button style="width: 100%; padding: 10px; border-radius: 5px; border: none; background: #6f2c80; color: white; cursor: pointer;">
                    Открыть кейс
                </button>
            </div>
        </section>
    </div>

    <script>
        // Локальная логика страницы
        document.getElementById("search-cases-btn").addEventListener("click", () => alert("Поиск..."));
    </script>
</body>
</html>
